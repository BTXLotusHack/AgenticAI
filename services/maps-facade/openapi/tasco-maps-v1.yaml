openapi: 3.1.0
info:
  title: Loopin Tasco Maps Facade
  version: 1.0.0
  description: Hackathon-compatible Tasco Maps facade with deterministic mock responses.
servers:
  - url: http://localhost:8787
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is healthy
  /v1/search:
    get:
      summary: Free-text search
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
        - in: query
          name: lat
          schema: { type: number }
        - in: query
          name: lon
          schema: { type: number }
        - in: query
          name: limit
          schema: { type: integer }
      responses:
        "200": { description: Search results }
        "400": { description: invalid_request }
        "429": { description: rate_limited }
  /v1/autocomplete:
    get:
      summary: Autocomplete suggestions
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
      responses:
        "200": { description: Autocomplete suggestions }
  /v1/poi/{id}:
    get:
      summary: POI details
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200": { description: POI details }
        "404": { description: not_found }
  /v1/reverse-geocoding:
    get:
      summary: Reverse geocoding
      parameters:
        - in: query
          name: lat
          required: true
          schema: { type: number }
        - in: query
          name: lon
          required: true
          schema: { type: number }
      responses:
        "200": { description: Reverse geocoding results }
  /v1/nearby-search:
    get:
      summary: Nearby search
      parameters:
        - in: query
          name: lat
          required: true
          schema: { type: number }
        - in: query
          name: lon
          required: true
          schema: { type: number }
      responses:
        "200": { description: Nearby results }
  /v1/geocoding:
    get:
      summary: Geocoding
      parameters:
        - in: query
          name: address
          required: true
          schema: { type: string }
      responses:
        "200": { description: Geocoding results }
  /v1/route:
    post:
      summary: Route calculation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [locations]
              properties:
                locations:
                  type: array
                  minItems: 2
                  items:
                    type: object
                    required: [lat, lon]
                    properties:
                      lat: { type: number }
                      lon: { type: number }
                alternates: { type: integer }
      responses:
        "200": { description: Route alternatives }
        "400": { description: invalid_request }
