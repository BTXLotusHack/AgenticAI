corridor:
  id: can_tho_hue
  name: "Cần Thơ → Huế"
  country: "Việt Nam"

actor:
  id: "compass/crawler-google-places"
  language: "vi"
  skip_closed_places: true

  # Cost guard for EACH Actor run. Override with --max-charge-usd.
  # This does not cap the combined cost of all jobs.
  max_total_charge_usd_per_run: 2.0

  # Discovery stays cheap. Detail data is collected later by Place ID.
  discovery_scrape_place_detail_page: false

  # Prefer coordinate-bounded crawling over free-text geocoding. This avoids
  # Nominatim/Google resolving small Vietnamese localities to the wrong polygon.
  use_custom_geolocation_from_center: true

  # Never collect reviewer identity/profile data.
  scrape_reviews_personal_data: false
  scrape_contacts: false
  scrape_social_profiles: false
  maximum_leads_enrichment_records: 0

enrichment_defaults:
  batch_size: 40
  reviews_origin: "google"
  reviews_sort: "newest"
  reviews_start_date: "2 years"
  max_reviews: 3
  max_images: 1

query_groups:
  accommodation:
    enabled: true
    priority: 10
    max_places_per_search: 20
    minimum_clean_places: 8
    search_terms:
      - "khách sạn"
      - "nhà nghỉ"
      - "homestay"
      - "hostel"
    enrichment:
      enabled: true
      per_location_limit: 20
      min_rating: 3.5
      min_reviews_count: 5
      max_reviews: 5
      max_images: 3

  food:
    enabled: true
    priority: 20
    max_places_per_search: 20
    minimum_clean_places: 10
    search_terms:
      - "quán ăn địa phương"
      - "quán cơm"
      - "quán ăn sáng"
      - "quán cà phê"
    enrichment:
      enabled: true
      per_location_limit: 20
      min_rating: 3.5
      min_reviews_count: 10
      max_reviews: 5
      max_images: 2

  attraction:
    enabled: true
    priority: 30
    max_places_per_search: 15
    minimum_clean_places: 5
    search_terms:
      - "địa điểm du lịch"
      - "điểm ngắm cảnh"
      - "bãi biển"
      - "khu cắm trại"
    enrichment:
      enabled: true
      per_location_limit: 18
      min_rating: 3.5
      min_reviews_count: 5
      max_reviews: 5
      max_images: 3

  fuel:
    enabled: true
    priority: 1
    max_places_per_search: 10
    minimum_clean_places: 3
    search_terms:
      - "trạm xăng"
    enrichment:
      enabled: true
      per_location_limit: 10
      min_rating: 0
      min_reviews_count: 0
      max_reviews: 2
      max_images: 1

  vehicle_repair:
    enabled: true
    priority: 2
    max_places_per_search: 10
    minimum_clean_places: 3
    search_terms:
      - "sửa xe máy"
      - "vá lốp xe máy"
      - "cứu hộ xe máy"
    enrichment:
      enabled: true
      per_location_limit: 10
      min_rating: 3.0
      min_reviews_count: 2
      max_reviews: 5
      max_images: 1

  rest_stop:
    enabled: true
    priority: 3
    max_places_per_search: 10
    minimum_clean_places: 3
    search_terms:
      - "trạm dừng chân"
      - "cửa hàng tiện lợi 24 giờ"
      - "nhà vệ sinh công cộng"
    enrichment:
      enabled: true
      per_location_limit: 10
      min_rating: 3.0
      min_reviews_count: 2
      max_reviews: 5
      max_images: 2

  healthcare:
    enabled: true
    priority: 4
    max_places_per_search: 8
    minimum_clean_places: 3
    search_terms:
      - "bệnh viện"
      - "phòng khám"
      - "nhà thuốc"
    enrichment:
      enabled: true
      per_location_limit: 8
      min_rating: 0
      min_reviews_count: 0
      max_reviews: 2
      max_images: 1

  parking:
    enabled: true
    priority: 5
    max_places_per_search: 8
    minimum_clean_places: 2
    search_terms:
      - "bãi đỗ xe"
      - "bãi giữ xe máy"
    enrichment:
      enabled: true
      per_location_limit: 8
      min_rating: 0
      min_reviews_count: 0
      max_reviews: 2
      max_images: 1

