# Backend-derived realtime event fanned out to live clients. The telemetry
# processor is the only IAM publisher; Cognito clients subscribe after a
# membership check in the resolver.
type RealtimeEvent @aws_iam @aws_cognito_user_pools {
  schemaVersion: Int!
  eventId: ID!
  tripId: ID!
  snapshotRevision: Int!
  graphRevision: Int!
  audience: AWSJSON!
  eventType: String!
  occurredAt: AWSDateTime!
  expiresAt: AWSDateTime!
  payload: AWSJSON!
}

input RealtimeEventInput {
  schemaVersion: Int!
  eventId: ID!
  tripId: ID!
  snapshotRevision: Int!
  graphRevision: Int!
  audience: AWSJSON!
  eventType: String!
  occurredAt: AWSDateTime!
  expiresAt: AWSDateTime!
  payload: AWSJSON!
}

type Mutation {
  # Called only by backend processors via IAM (SigV4). Clients cannot invoke it;
  # they only subscribe. This keeps deterministic backend code as the sole live
  # publisher.
  publishRealtimeEvent(input: RealtimeEventInput!): RealtimeEvent @aws_iam
}

type Subscription {
  # Cognito identifies the caller. A DynamoDB resolver additionally requires a
  # current USER#sub / TEAM#tripId membership before registering this channel.
  onRealtimeEvent(tripId: ID!): RealtimeEvent
    @aws_subscribe(mutations: ["publishRealtimeEvent"])
    @aws_cognito_user_pools
}

type Query {
  # AppSync requires a Query root; the fast path does not use it.
  _health: String @aws_iam @aws_cognito_user_pools
}

schema {
  query: Query
  mutation: Mutation
  subscription: Subscription
}
